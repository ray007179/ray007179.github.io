<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <title>y45j04</title>
    <style>
        /* 全體樣式 */
        body {
            min-height: 100vh;
            background: white;
            border-left: 50px solid #000000;
            border-right: 50px solid #000;
        }

        /* 頂部 Hero 區域 */
        .hero {
            min-height: 40vh;
            background: linear-gradient(100deg, #2473f1);
            color: rgb(255, 255, 255);
        }

        /* 標題樣式（僅套用於 Hero） */
        .hero .title1 {
            text-align: center;
            font-size: clamp(2rem, 8vw, 4.5rem);
            line-height: 1.05;
            margin: 0;
            letter-spacing: 0.5px;
            word-break: keep-all;
        }

        /* title1 的內容文字樣式（分離內容與排版） */
        .title1-text {
            display: inline-block;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif;
        }

        /* Hero 區段落 */
        .hero p {
            text-align: center;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            margin: 0.75rem auto 0;
            max-width: 720px;
        }

        /* 主區域 */
        main {
            background-color: white;
        }

        /* 區段標題 */
        .section-title {
            border-left: 4px solid #4f6ef3;
            padding-left: 12px;
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="hero d-flex align-items-center">
        <div class="container py-5">
            <div class="row">
                <div class="col-lg-8 mx-auto text-center">
                    <h1 class="title1">
                        <span class="title1-text">Welcome to my autobiography</span>
                    </h1>
                </div>
            </div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand" href="#">目錄</a>
        </div>
    </nav>

    <main class="container py-5">
        <section id="about" class="mb-5">
            <div class="section-title mb-4">
                <h2>自我介紹</h2>
            </div>
            <div class="card shadow-sm">
                <div class="card-body"></div>
            </div>
        </section>

        <section id="skills" class="mb-5">
            <div class="section-title mb-4">
                <h2>專業技能</h2>
            </div>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">程式語言</h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">開發工具</h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">學習與實作</h5>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="projects" class="mb-5">
            <div class="section-title mb-4">
                <h2>專案作品</h2>
            </div>
            <div class="list-group shadow-sm">
                <div class="list-group-item">
                    <h5>網頁開發作品</h5>
                </div>
                <div class="list-group-item">
                    <h5>資料庫管理系統</h5>
                </div>
                <div class="list-group-item">
                    <h5>資料分析專案</h5>
                </div>
            </div>
        </section>

        <section id="articles" class="mb-5">
            <div class="section-title mb-4">
                <h2>文章</h2>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">科技觀點</h5>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-white py-4 border-top">
        <div class="container text-center">
            <p class="mb-0">Copyright © 2026 自傳網站</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
